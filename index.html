<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPSO AD5 — EU Knowledge Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --eu-blue: #003399;
    --eu-gold: #FFCC00;
    --eu-dark: #001A6E;
    --eu-mid:  #1a47b8;
    --bg:      #F7F8FC;
    --surface: #FFFFFF;
    --text:    #0D1B4B;
    --muted:   #6B7A9D;
    --correct: #1B7A3E;
    --correct-bg: #E8F5EE;
    --wrong:   #C0392B;
    --wrong-bg: #FDECEC;
    --unanswered: #E5E9F5;
    --radius:  12px;
    --shadow:  0 4px 24px rgba(0,51,153,.10);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .app-header {
    background: linear-gradient(135deg, var(--eu-dark) 0%, var(--eu-blue) 60%, var(--eu-mid) 100%);
    padding: 0;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,.35);
  }
  .header-inner {
    max-width: 900px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    gap: 16px;
  }
  .header-title {
    display: flex; align-items: center; gap: 14px;
  }
  .eu-flag {
    width: 40px; height: 27px;
    background: var(--eu-blue);
    border: 2px solid rgba(255,255,255,.25);
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .header-title h1 {
    font-family: 'Libre Baskerville', serif;
    font-size: 1.15rem; font-weight: 700;
    color: #fff; line-height: 1.2;
  }
  .header-title p {
    font-size: .75rem; color: rgba(255,255,255,.65);
    font-weight: 400; margin-top: 1px;
  }
  .header-stats {
    display: flex; gap: 20px; flex-shrink: 0;
  }
  .stat-chip {
    text-align: center;
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 8px; padding: 6px 14px;
  }
  .stat-chip .val {
    font-size: 1.2rem; font-weight: 600; color: var(--eu-gold);
    display: block; line-height: 1;
  }
  .stat-chip .lbl {
    font-size: .65rem; color: rgba(255,255,255,.65);
    text-transform: uppercase; letter-spacing: .05em;
  }

  /* ── PROGRESS BAR ── */
  .progress-bar-wrap {
    background: rgba(0,0,0,.25); height: 4px;
  }
  .progress-bar-fill {
    height: 100%; background: var(--eu-gold);
    transition: width .4s ease;
  }

  /* ── MAIN LAYOUT ── */
  .app-body {
    max-width: 900px; margin: 0 auto;
    padding: 28px 20px 60px;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 24px;
  }
  @media(max-width:700px) {
    .app-body { grid-template-columns: 1fr; }
    .sidebar { order: 2; }
  }

  /* ── SIDEBAR ── */
  .sidebar { position: sticky; top: 90px; align-self: start; }
  .sidebar-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .sidebar-section-title {
    background: var(--eu-blue);
    color: #fff; font-size: .72rem;
    font-weight: 600; letter-spacing: .07em;
    text-transform: uppercase;
    padding: 9px 14px;
  }
  .section-list { padding: 8px; }
  .section-btn {
    width: 100%; text-align: left;
    padding: 9px 11px; border-radius: 7px;
    border: none; background: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: .82rem; color: var(--text);
    transition: background .15s;
    display: flex; justify-content: space-between; align-items: center;
    gap: 8px;
  }
  .section-btn:hover { background: var(--unanswered); }
  .section-btn.active { background: #EEF2FF; color: var(--eu-blue); font-weight: 600; }
  .section-btn .badge {
    background: var(--eu-blue); color: #fff;
    border-radius: 20px; padding: 1px 7px;
    font-size: .68rem; font-weight: 600; flex-shrink: 0;
  }
  .section-btn.active .badge { background: var(--eu-gold); color: var(--eu-dark); }
  .sidebar-divider { border: none; border-top: 1px solid #E8EBF5; margin: 4px 8px; }

  .score-mini {
    padding: 14px;
    border-top: 1px solid #E8EBF5;
  }
  .score-mini h4 { font-size: .72rem; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 8px; }
  .score-row { display: flex; justify-content: space-between; font-size: .82rem; margin-bottom: 4px; }
  .score-row .label { color: var(--muted); }
  .score-row .val-correct { color: var(--correct); font-weight: 600; }
  .score-row .val-wrong   { color: var(--wrong); font-weight: 600; }
  .score-row .val-skip    { color: var(--muted); font-weight: 600; }

  .reset-btn {
    width: 100%; margin-top: 10px;
    padding: 9px; border-radius: 8px;
    background: var(--eu-blue); color: #fff;
    border: none; cursor: pointer; font-family: 'DM Sans',sans-serif;
    font-size: .82rem; font-weight: 600;
    transition: background .15s;
  }
  .reset-btn:hover { background: var(--eu-dark); }

  /* ── QUESTION GRID MINI MAP ── */
  .mini-map-wrap { padding: 10px; border-top: 1px solid #E8EBF5; }
  .mini-map-title { font-size: .7rem; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 6px; }
  .mini-map {
    display: flex; flex-wrap: wrap; gap: 3px;
  }
  .mini-dot {
    width: 14px; height: 14px; border-radius: 3px;
    background: var(--unanswered);
    cursor: pointer; transition: transform .1s;
    font-size: 0;
  }
  .mini-dot:hover { transform: scale(1.3); }
  .mini-dot.correct { background: var(--correct); }
  .mini-dot.wrong   { background: var(--wrong); }
  .mini-dot.current { outline: 2px solid var(--eu-gold); outline-offset: 1px; }

  /* ── QUESTION CARD ── */
  .q-area { min-width: 0; }
  .q-section-label {
    font-size: .7rem; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase; color: var(--eu-blue);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .q-section-label::before {
    content: ''; display: inline-block;
    width: 10px; height: 3px; border-radius: 2px;
    background: var(--eu-gold);
  }
  .q-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px 32px 24px;
    animation: fadeSlide .25s ease;
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .q-number {
    font-size: .72rem; color: var(--muted);
    font-weight: 500; margin-bottom: 12px;
  }
  .q-text {
    font-family: 'Libre Baskerville', serif;
    font-size: 1.1rem; line-height: 1.6;
    color: var(--text); margin-bottom: 24px;
  }

  .options-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    width: 100%; text-align: left;
    border: 2px solid #DDE2F0;
    border-radius: 10px; padding: 13px 18px;
    background: var(--surface); cursor: pointer;
    display: flex; align-items: flex-start; gap: 13px;
    font-family: 'DM Sans', sans-serif;
    font-size: .92rem; color: var(--text); line-height: 1.45;
    transition: border-color .15s, background .15s, transform .1s;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--eu-blue);
    background: #EEF2FF; transform: translateX(2px);
  }
  .option-letter {
    flex-shrink: 0; width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--unanswered); color: var(--eu-blue);
    font-size: .78rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, color .15s;
  }
  .option-btn:hover:not(:disabled) .option-letter {
    background: var(--eu-blue); color: #fff;
  }
  .option-btn.selected-correct {
    border-color: var(--correct);
    background: var(--correct-bg);
  }
  .option-btn.selected-correct .option-letter {
    background: var(--correct); color: #fff;
  }
  .option-btn.selected-wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
  }
  .option-btn.selected-wrong .option-letter {
    background: var(--wrong); color: #fff;
  }
  .option-btn.reveal-correct {
    border-color: var(--correct);
    background: var(--correct-bg);
  }
  .option-btn.reveal-correct .option-letter {
    background: var(--correct); color: #fff;
  }
  .option-btn:disabled { cursor: default; }

  /* ── FEEDBACK ── */
  .feedback {
    margin-top: 16px; padding: 12px 16px;
    border-radius: 8px; font-size: .88rem;
    display: flex; align-items: center; gap: 10px;
    animation: fadeSlide .2s ease;
  }
  .feedback.correct { background: var(--correct-bg); color: var(--correct); border: 1px solid #b2dfcc; }
  .feedback.wrong   { background: var(--wrong-bg);   color: var(--wrong);   border: 1px solid #f5c6c6; }
  .feedback-icon { font-size: 1.2rem; flex-shrink: 0; }

  /* ── NAV BUTTONS ── */
  .q-nav {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 22px; gap: 12px;
  }
  .nav-btn {
    padding: 10px 22px; border-radius: 9px;
    border: 2px solid var(--eu-blue); cursor: pointer;
    font-family: 'DM Sans',sans-serif; font-size: .88rem; font-weight: 600;
    transition: background .15s, color .15s;
  }
  .nav-btn.secondary { background: #fff; color: var(--eu-blue); }
  .nav-btn.secondary:hover { background: #EEF2FF; }
  .nav-btn.primary { background: var(--eu-blue); color: #fff; border-color: var(--eu-blue); }
  .nav-btn.primary:hover { background: var(--eu-dark); border-color: var(--eu-dark); }
  .nav-btn:disabled { opacity: .35; cursor: not-allowed; }

  .q-counter-center { font-size: .82rem; color: var(--muted); }

  /* ── RESULTS SCREEN ── */
  .results-screen {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 40px 36px;
    text-align: center;
    animation: fadeSlide .3s ease;
  }
  .results-screen .trophy { font-size: 3.5rem; margin-bottom: 12px; }
  .results-screen h2 {
    font-family: 'Libre Baskerville', serif;
    font-size: 1.8rem; color: var(--eu-blue); margin-bottom: 6px;
  }
  .results-screen .subtitle { color: var(--muted); font-size: .95rem; margin-bottom: 28px; }
  .score-display {
    font-size: 4rem; font-weight: 700; color: var(--eu-blue);
    line-height: 1; margin-bottom: 4px;
  }
  .score-pct { font-size: 1.1rem; color: var(--muted); margin-bottom: 28px; }
  .results-breakdown {
    display: flex; gap: 16px; justify-content: center; margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .breakdown-card {
    border-radius: 10px; padding: 14px 20px; min-width: 110px;
  }
  .breakdown-card.c { background: var(--correct-bg); color: var(--correct); }
  .breakdown-card.w { background: var(--wrong-bg);   color: var(--wrong); }
  .breakdown-card.s { background: var(--unanswered); color: var(--muted); }
  .breakdown-card .bc-num { font-size: 2rem; font-weight: 700; line-height: 1; }
  .breakdown-card .bc-lbl { font-size: .78rem; font-weight: 500; margin-top: 2px; }
  .results-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .results-btns .nav-btn { font-size: .9rem; }

  /* Section filter bar */
  .filter-bar {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 18px;
    margin-bottom: 18px;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  }
  .filter-bar label { font-size: .78rem; font-weight: 600; color: var(--muted); margin-right: 4px; }
  .filter-chip {
    border: 2px solid #DDE2F0; border-radius: 20px;
    padding: 5px 13px; cursor: pointer;
    font-size: .78rem; font-family: 'DM Sans',sans-serif;
    background: #fff; color: var(--text);
    transition: all .15s;
  }
  .filter-chip:hover, .filter-chip.active {
    background: var(--eu-blue); color: #fff; border-color: var(--eu-blue);
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="header-inner">
    <div class="header-title">
      <div class="eu-flag">🇪🇺</div>
      <div>
        <h1>EPSO AD5 Generalist — EU Knowledge Test</h1>
        <p>200 Multiple-Choice Questions · 4 Sections · Full Answer Key</p>
      </div>
    </div>
    <div class="header-stats">
      <div class="stat-chip">
        <span class="val" id="hdr-score">0</span>
        <span class="lbl">Score</span>
      </div>
      <div class="stat-chip">
        <span class="val" id="hdr-pct">0%</span>
        <span class="lbl">Accuracy</span>
      </div>
      <div class="stat-chip">
        <span class="val" id="hdr-left">200</span>
        <span class="lbl">Left</span>
      </div>
    </div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
  </div>
</header>

<!-- BODY -->
<div class="app-body" id="app-body">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-card">
      <div class="sidebar-section-title">Sections</div>
      <div class="section-list" id="section-list"></div>
      <hr class="sidebar-divider">
      <div class="score-mini">
        <h4>Your Progress</h4>
        <div class="score-row"><span class="label">✅ Correct</span><span class="val-correct" id="sb-correct">0</span></div>
        <div class="score-row"><span class="label">❌ Wrong</span><span class="val-wrong" id="sb-wrong">0</span></div>
        <div class="score-row"><span class="label">⏭ Skipped</span><span class="val-skip" id="sb-skip">200</span></div>
        <button class="reset-btn" onclick="resetQuiz()">↺ Reset All</button>
      </div>
      <div class="mini-map-wrap">
        <div class="mini-map-title">Question Map</div>
        <div class="mini-map" id="mini-map"></div>
      </div>
    </div>
  </aside>

  <!-- QUESTION AREA -->
  <main class="q-area" id="q-area">
    <!-- Filter bar -->
    <div class="filter-bar" id="filter-bar">
      <label>Filter:</label>
      <button class="filter-chip active" data-filter="all" onclick="setFilter('all',this)">All (200)</button>
      <button class="filter-chip" data-filter="EU General Knowledge" onclick="setFilter('EU General Knowledge',this)">General (40)</button>
      <button class="filter-chip" data-filter="Institutions, Bodies & Agencies" onclick="setFilter('Institutions, Bodies & Agencies',this)">Institutions (50)</button>
      <button class="filter-chip" data-filter="Legislative Procedures" onclick="setFilter('Legislative Procedures',this)">Legislative (30)</button>
      <button class="filter-chip" data-filter="EU Policies & Programmes" onclick="setFilter('EU Policies & Programmes',this)">Policies (80)</button>
    </div>

    <!-- Question card rendered here -->
    <div id="q-container"></div>
  </main>
</div>

<script>
const QUIZ_DATA = [{"n": 1, "s": "EU General Knowledge", "q": "When did the Treaty of Lisbon enter into force?", "o": ["1 January 2009", "1 December 2009", "31 December 2009", "1 January 2010"], "a": 1}, {"n": 2, "s": "EU General Knowledge", "q": "Which of the following was the founding treaty of the European Coal and Steel Community?", "o": ["The Paris Treaty", "The Nice Treaty", "The Amsterdam Treaty", "The Schuman Treaty"], "a": 0}, {"n": 3, "s": "EU General Knowledge", "q": "Why is 9 May “Europe Day”?", "o": ["On that date, Europe marks the end of World War II", "On that date in 1950, the Schuman Declaration was made", "On that date in 1953, the European Union was officially founded", "On that date in 1950, an important international treaty was signed leading to the creation of the ECSC"], "a": 1}, {"n": 4, "s": "EU General Knowledge", "q": "How many years passed between the signing of the European Coal and Steel Community (ECSC) Treaty and its expiry?", "o": ["25 years, from 1952 to 1977", "40 years, from 1952 to 1992", "It is still in force", "50 years, from 1952 to 2002"], "a": 3}, {"n": 5, "s": "EU General Knowledge", "q": "Which of these countries did not sign the ECSC Treaty in 1951?", "o": ["The Netherlands", "Italy", "Denmark", "Luxembourg"], "a": 2}, {"n": 6, "s": "EU General Knowledge", "q": "Which two treaties were signed on 25 March 1957?", "o": ["The Treaty of Rome and the Euratom Treaty", "The Treaty of Versailles and the Treaty of Maastricht", "The Treaty of Paris and the Schuman Treaty", "The Treaty of Lisbon and the Treaty of Nice"], "a": 0}, {"n": 7, "s": "EU General Knowledge", "q": "When did the first European Community enlargement take place?", "o": ["In 1957, when Germany, France, Italy, Belgium, Netherlands, and Luxembourg joined", "In 1961, when Greece joined", "In 1973, when Denmark, Ireland and the UK joined", "In 1981, when Greece joined"], "a": 2}, {"n": 8, "s": "EU General Knowledge", "q": "In which country was the Schengen Agreement signed in 1985?", "o": ["Germany", "Luxembourg", "The Netherlands", "Austria"], "a": 1}, {"n": 9, "s": "EU General Knowledge", "q": "Which EU treaty is also known as the “Merger Treaty”? 316", "o": ["The Brussels Treaty, which established a single Council and a single Commission for the European Communities", "The Treaty of Rome, which established both the European Economic Community (EEC) and the European Atomic Energy Community", "The Maastricht Treaty, which created the European Union by integrating policies and establishing common foreign and security cooperation", "The Lisbon Treaty, which reformed the functioning of the EU’s institutions and decision-making processes to accommodate its expansion"], "a": 0}, {"n": 10, "s": "EU General Knowledge", "q": "Who was named the UK’s Foreign Secretary following the Brexit vote in 2016?", "o": ["Dominic Raab", "Liz Truss", "Theresa May", "Boris Johnson"], "a": 3}, {"n": 11, "s": "EU General Knowledge", "q": "The EU Parliament has had three women as its President in its history. Which of these women has never occupied the role?", "o": ["Nicole Fontaine", "Roberta Metsola", "Simone Veil", "Evelyne Gebhardt"], "a": 3}, {"n": 12, "s": "EU General Knowledge", "q": "The European Parliament’s main entrance is located in Simone Veil Agora in Brussels. Which founding father is the central building named after?", "o": ["Konrad Adenauer", "Jean Monnet", "Robert Schuman", "Altiero Spinelli"], "a": 3}, {"n": 13, "s": "EU General Knowledge", "q": "Which two European politicians who were key figures in the initial phases of the EU’s creation were photographed holding hands at the Douaumont Ossuary, Verdun in 1984, in an image which made history?", "o": ["Jean Monnet and Robert Schuman", "President Mitterrand and Chancellor Kohl", "Helmut Schmidt and Valéry Giscard d’Estaing", "Winston Churchill and Konrad Adenauer"], "a": 1}, {"n": 14, "s": "EU General Knowledge", "q": "Which EU founding father or mother was a Holocaust survivor?", "o pened to the European Medicines Agency (EMA) and the European Banking Authority (EBA), which were based in London?", "o": ["They were relocated to Amsterdam and Paris, respectively, following a vote in the margins of the General Affairs Council", "The agencies’ operations remained in London due to logistical considerations and to accommodate staff who had moved there", "The European Council voted unanimously to relocate the agencies to Vienna and Stockholm in 2017", "Both agencies were merged into pre-existing institutions located in Brussels"], "a": 0}, {"n": 198, "s": "EU Policies & Programmes", "q": "What is the New European Bauhaus?", "o": ["An annual art festival sponsored by the European Parliament", "A European school of design responsible for recent EU buildings 339", "A cross-disciplinary endeavour that bridges the European Green Deal with people’s daily environments", "An architectural competition focused on sustainable urban planning in EU cities"], "a": 2}, {"n": 199, "s": "EU Policies & Programmes", "q": "Which article of the North Atlantic Treaty establishes collective defence?", "o": ["Article 1", "It is established in the preamble", "Article 5", "Article 10"], "a": 2}, {"n": 200, "s": "EU Policies & Programmes", "q": "What is the name of the United Nations’ 2030 Agenda objectives, which are streamlined into the EU’s policies and programmes?", "o": ["The UN/EU Working Programme", "The Agenda 2030 World Programme", "The UN 2030 Global Objectives", "The Sustainable Development Goals"], "a": 3}];
// ── State ──────────────────────────────────────────────────────────────────
let allQ = QUIZ_DATA;   // all 200
let filteredQ = [...allQ];
let currentIdx = 0;
let answers_state = {};  // q.n -> { chosen: idx, correct: bool }
let currentFilter = 'all';

// ── Init ──────────────────────────────────────────────────────────────────
function init() {
  buildSectionList();
  buildMiniMap();
  renderQuestion();
  updateStats();
}

// ── Section sidebar ────────────────────────────────────────────────────────
const SECTIONS = [
  { key: 'EU General Knowledge',            label: 'I. EU General Knowledge',    count: 40 },
  { key: 'Institutions, Bodies & Agencies', label: 'II. Institutions & Bodies',  count: 50 },
  { key: 'Legislative Procedures',          label: 'III. Legislative Procedures',count: 30 },
  { key: 'EU Policies & Programmes',        label: 'IV. Policies & Programmes',  count: 80 },
];
function buildSectionList() {
  const el = document.getElementById('section-list');
  el.innerHTML = '<button class="section-btn active" data-sec="all" onclick="setFilterSidebar(\'all\',this)"><span>All Sections</span><span class="badge">200</span></button>';
  SECTIONS.forEach(s => {
    el.innerHTML += `<button class="section-btn" data-sec="${s.key}" onclick="setFilterSidebar('${s.key}',this)"><span>${s.label}</span><span class="badge">${s.count}</span></button>`;
  });
}

// ── Mini-map ───────────────────────────────────────────────────────────────
function buildMiniMap() {
  const el = document.getElementById('mini-map');
  el.innerHTML = '';
  filteredQ.forEach((q, i) => {
    const dot = document.createElement('div');
    dot.className = 'mini-dot';
    dot.id = `dot-${q.n}`;
    dot.title = `Q${q.n}`;
    dot.onclick = () => goToQ(i);
    el.appendChild(dot);
  });
}
function updateMiniMap() {
  filteredQ.forEach((q, i) => {
    const dot = document.getElementById(`dot-${q.n}`);
    if (!dot) return;
    const st = answers_state[q.n];
    dot.className = 'mini-dot' + (st ? (st.correct ? ' correct' : ' wrong') : '') + (i === currentIdx ? ' current' : '');
  });
}

// ── Filter logic ───────────────────────────────────────────────────────────
function setFilter(filter, btn) {
  currentFilter = filter;
  filteredQ = filter === 'all' ? [...allQ] : allQ.filter(q => q.s === filter);
  currentIdx = 0;
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // sync sidebar
  document.querySelectorAll('.section-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.sec === filter);
  });
  buildMiniMap();
  renderQuestion();
  updateStats();
}
function setFilterSidebar(filter, btn) {
  currentFilter = filter;
  filteredQ = filter === 'all' ? [...allQ] : allQ.filter(q => q.s === filter);
  currentIdx = 0;
  document.querySelectorAll('.section-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.filter-chip').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === filter);
  });
  buildMiniMap();
  renderQuestion();
  updateStats();
}

// ── Render question ─────────────────────────────────────────────────────────
function renderQuestion() {
  const container = document.getElementById('q-container');
  if (currentIdx >= filteredQ.length) {
    showResults();
    return;
  }
  const q = filteredQ[currentIdx];
  const st = answers_state[q.n];
  const answered = !!st;

  const letters = ['A','B','C','D'];
  const optionsHTML = q.o.map((opt, i) => {
    let cls = 'option-btn';
    if (answered) {
      if (i === q.a) cls += ' reveal-correct';
      if (st && i === st.chosen && !st.correct) cls += ' selected-wrong';
    }
    return `<li>
      <button class="${cls}" ${answered ? 'disabled' : ''} onclick="chooseAnswer(${i})">
        <span class="option-letter">${letters[i]}</span>
        <span>${escHtml(opt)}</span>
      </button>
    </li>`;
  }).join('');

  let feedbackHTML = '';
  if (answered) {
    if (st.correct) {
      feedbackHTML = `<div class="feedback correct"><span class="feedback-icon">✅</span><span>Correct! Well done.</span></div>`;
    } else {
      const correctText = q.o[q.a];
      feedbackHTML = `<div class="feedback wrong"><span class="feedback-icon">❌</span><span>Incorrect. The correct answer is <strong>${letters[q.a]}. ${escHtml(correctText)}</strong></span></div>`;
    }
  }

  const pct = filteredQ.length > 0 ? Math.round((currentIdx / filteredQ.length) * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';

  container.innerHTML = `
    <div class="q-section-label">${escHtml(q.s)}</div>
    <div class="q-card" id="q-card-main">
      <div class="q-number">Question ${q.n} of 200 &nbsp;·&nbsp; ${currentIdx + 1} of ${filteredQ.length} shown</div>
      <div class="q-text">${escHtml(q.q)}</div>
      <ul class="options-list">${optionsHTML}</ul>
      ${feedbackHTML}
      <div class="q-nav">
        <button class="nav-btn secondary" onclick="prevQ()" ${currentIdx === 0 ? 'disabled' : ''}>← Previous</button>
        <span class="q-counter-center">${currentIdx + 1} / ${filteredQ.length}</span>
        <button class="nav-btn primary" onclick="nextQ()" ${currentIdx >= filteredQ.length - 1 && !answered ? 'disabled' : ''}>${currentIdx >= filteredQ.length - 1 ? 'See Results →' : 'Next →'}</button>
      </div>
    </div>`;

  updateMiniMap();
}

function chooseAnswer(chosenIdx) {
  const q = filteredQ[currentIdx];
  if (answers_state[q.n]) return; // already answered
  const correct = chosenIdx === q.a;
  answers_state[q.n] = { chosen: chosenIdx, correct };
  renderQuestion();
  updateStats();
}

function nextQ() {
  if (currentIdx < filteredQ.length - 1) {
    currentIdx++;
    renderQuestion();
  } else {
    showResults();
  }
}
function prevQ() {
  if (currentIdx > 0) { currentIdx--; renderQuestion(); }
}
function goToQ(idx) {
  currentIdx = idx;
  renderQuestion();
}

// ── Stats ──────────────────────────────────────────────────────────────────
function updateStats() {
  let correct = 0, wrong = 0, answered = 0;
  allQ.forEach(q => {
    const st = answers_state[q.n];
    if (st) { answered++; st.correct ? correct++ : wrong++; }
  });
  const skip = allQ.length - answered;
  const pct = answered > 0 ? Math.round((correct / answered) * 100) : 0;
  document.getElementById('hdr-score').textContent = correct;
  document.getElementById('hdr-pct').textContent = pct + '%';
  document.getElementById('hdr-left').textContent = skip;
  document.getElementById('sb-correct').textContent = correct;
  document.getElementById('sb-wrong').textContent = wrong;
  document.getElementById('sb-skip').textContent = skip;
}

// ── Results screen ─────────────────────────────────────────────────────────
function showResults() {
  let correct = 0, wrong = 0;
  filteredQ.forEach(q => {
    const st = answers_state[q.n];
    if (st) { st.correct ? correct++ : wrong++; }
  });
  const answered = correct + wrong;
  const skip = filteredQ.length - answered;
  const pct = answered > 0 ? Math.round((correct / answered) * 100) : 0;
  let trophy = pct >= 80 ? '🏆' : pct >= 60 ? '🎯' : '📚';
  let msg = pct >= 80 ? 'Excellent! You\'re ready for the EPSO exam.' :
            pct >= 60 ? 'Good progress! Keep studying.' :
            'Keep practising — you\'ll get there!';

  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('q-container').innerHTML = `
    <div class="results-screen">
      <div class="trophy">${trophy}</div>
      <h2>Quiz Complete!</h2>
      <p class="subtitle">${msg}</p>
      <div class="score-display">${correct}/${filteredQ.length}</div>
      <div class="score-pct">${pct}% accuracy on answered questions</div>
      <div class="results-breakdown">
        <div class="breakdown-card c"><div class="bc-num">${correct}</div><div class="bc-lbl">Correct</div></div>
        <div class="breakdown-card w"><div class="bc-num">${wrong}</div><div class="bc-lbl">Wrong</div></div>
        <div class="breakdown-card s"><div class="bc-num">${skip}</div><div class="bc-lbl">Skipped</div></div>
      </div>
      <div class="results-btns">
        <button class="nav-btn secondary" onclick="reviewMode()">Review Answers</button>
        <button class="nav-btn primary" onclick="resetSection()">↺ Retry This Set</button>
        <button class="nav-btn primary" onclick="resetQuiz()">↺ Full Reset</button>
      </div>
    </div>`;
  updateStats();
}

function reviewMode() {
  currentIdx = 0;
  renderQuestion();
}
function resetSection() {
  filteredQ.forEach(q => delete answers_state[q.n]);
  currentIdx = 0;
  buildMiniMap();
  renderQuestion();
  updateStats();
}
function resetQuiz() {
  answers_state = {};
  currentIdx = 0;
  filteredQ = currentFilter === 'all' ? [...allQ] : allQ.filter(q => q.s === currentFilter);
  buildMiniMap();
  renderQuestion();
  updateStats();
}

// ── Utility ────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ───────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
